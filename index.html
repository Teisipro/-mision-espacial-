<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para mi infinito</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }

        body, html {
            height: 100vh; width: 100vw;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #fff; font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            padding: 2rem;
            width: 90%; max-width: 420px;
            text-align: center;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .romantic-title {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem; color: #ff2d75;
            text-shadow: 0 0 15px rgba(255, 45, 117, 0.6);
            margin-bottom: 10px;
        }

        input {
            width: 100%; background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 12px; border-radius: 12px;
            color: white; text-align: center; margin-bottom: 15px; outline: none;
        }

        button {
            padding: 12px 25px; border-radius: 50px; border: none;
            font-weight: 700; cursor: pointer; transition: 0.3s;
        }

        .btn-si { background: #ff2d75; color: white; min-width: 100px; }
        .btn-no { background: #6a1b9a; color: white; min-width: 100px; }
        .btn-next { background: #fff; color: #ff2d75; width: 100%; margin-top: 15px; }

        .float-name {
            position: fixed; pointer-events: none;
            animation: floatUp 5s linear forwards;
            font-weight: bold; font-family: 'Dancing Script', cursive;
            z-index: 5;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(20deg); opacity: 0; }
        }

        .space-obj { position: fixed; font-size: 2rem; z-index: 2; pointer-events: none; transition: all 8s linear; }

        #heart-explosion {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 5rem; z-index: 100;
            display: none; flex-direction: column; align-items: center;
        }
    </style>
</head>
<body>

    <canvas id="space-canvas"></canvas>
    <div id="youtube-player"></div>

    <div id="heart-explosion">
        <span>❤️</span>
        <h2 style="font-family: 'Dancing Script'; color: white; text-shadow: 0 0 10px #ff2d75;">Te amo</h2>
    </div>

    <!-- 1. ACCESO -->
    <div class="glass-card" id="panel-acceso">
        <h1 class="romantic-title">Jocelyn</h1>
        <p style="margin-bottom: 15px; font-size: 0.9rem;">"Al infinito..."</p>
        <input type="text" id="pass" placeholder="Completa la frase">
        <button style="background: white; width: 100%;" onclick="verificar()">Entrar</button>
    </div>

    <!-- 2. PROPUESTA -->
    <div class="glass-card" id="panel-propuesta" style="display:none;">
        <h1 class="romantic-title">¿Me dejas volver?</h1>
        <p>Tú eres mi infinito.</p>
        <div class="btn-group" style="display:flex; gap:10px; justify-content: center; margin-top: 20px;">
            <button class="btn-si" onclick="secuenciaCohete()">SÍ</button>
            <button class="btn-no" id="btn-no-mov" onmouseover="huir(this)" onclick="final('no_choice')">NO</button>
        </div>
    </div>

    <!-- 3. POEMA -->
    <div class="glass-card" id="panel-poema" style="display:none;">
        <div style="font-size: 0.85rem; line-height: 1.6; margin-bottom: 15px;">
            <p><b>Hagamos un trato</b><br><br>
            Usted sabe que puede contar conmigo,<br>
            no hasta dos o hasta diez,<br> sino contar conmigo.<br><br>
            <i>— Mario Benedetti</i></p>
        </div>
        <button class="btn-next" onclick="irASeleccion()">Siguiente</button>
    </div>

    <!-- 4. SELECCIÓN FINAL -->
    <div class="glass-card" id="panel-seleccion" style="display:none;">
        <h2 class="romantic-title" style="font-size: 1.8rem;">Dime algo...</h2>
        <div class="btn-group" style="display:flex; flex-direction: column; gap:10px;">
            <button class="btn-si" onclick="final('si')">¿Por qué elegiste SÍ?</button>
            <button class="btn-no" onclick="final('no')">¿Por qué elegiste NO?</button>
        </div>
    </div>

    <!-- 5. FINAL -->
    <div class="glass-card" id="panel-final" style="display:none;">
        <h2 id="final-titulo" class="romantic-title"></h2>
        <p id="final-texto"></p>
        <br>
        <p style="color: #ff2d75; font-weight: bold;">Jocelyn & Teisi</p>
    </div>

<script>
    const canvas = document.getElementById('space-canvas');
    const ctx = canvas.getContext('2d');
    let player;

    // YouTube API
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtube-player', {
            height: '0', width: '0', videoId: 'WrjF8bZTCZI',
            playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': 'WrjF8bZTCZI' }
        });
    }

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', init);
    init();

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
        for(let i=0; i<80; i++) {
            ctx.beginPath();
            ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*1.2, 0, Math.PI*2);
            ctx.fill();
        }
    }
    setInterval(animate, 1500);

    function verificar() {
        const val = document.getElementById('pass').value.toLowerCase();
        if(val.includes("mas alla") || val.includes("más allá")) {
            if(player && player.playVideo) player.playVideo();
            document.getElementById('panel-acceso').style.display = 'none';
            document.getElementById('panel-propuesta').style.display = 'block';
            spawnSpaceObjects();
        } else { alert("Pista: Y..."); }
    }

    function huir(btn) {
        const maxX = window.innerWidth - btn.offsetWidth - 40;
        const maxY = window.innerHeight - btn.offsetHeight - 40;
        btn.style.position = "fixed";
        btn.style.left = Math.max(20, Math.random() * maxX) + "px";
        btn.style.top = Math.max(20, Math.random() * maxY) + "px";
    }

    function spawnSpaceObjects() {
        const icons = ['🚀', '🛸', '🛰️', '✨'];
        setInterval(() => {
            const obj = document.createElement('div');
            obj.className = 'space-obj';
            obj.innerText = icons[Math.floor(Math.random()*icons.length)];
            obj.style.left = "-60px";
            obj.style.top = Math.random() * 80 + "vh";
            document.body.appendChild(obj);
            setTimeout(() => { obj.style.left = "110vw"; }, 100);
            setTimeout(() => obj.remove(), 8100);
        }, 3000);
    }

    function secuenciaCohete() {
        document.getElementById('panel-propuesta').style.display = 'none';
        const rocket = document.createElement('div');
        rocket.innerText = "🚀";
        rocket.style.cssText = "position:fixed; bottom:0; left:50%; font-size:3rem; z-index:99; transition:all 1.2s ease-in; transform:translateX(-50%);";
        document.body.appendChild(rocket);

        setTimeout(() => { rocket.style.bottom = "50%"; }, 100);

        setTimeout(() => {
            rocket.remove();
            const exp = document.getElementById('heart-explosion');
            exp.style.display = 'flex';
            setTimeout(() => { exp.style.transform = 'translate(-50%, -50%) scale(1.5)'; }, 50);
            
            lluviaNombres();

            setTimeout(() => {
                exp.style.opacity = '0';
                setTimeout(() => {
                    exp.style.display = 'none';
                    document.getElementById('panel-poema').style.display = 'block';
                }, 500);
            }, 2000);
        }, 1300);
    }

    function lluviaNombres() {
        setInterval(() => {
            const isTeisi = Math.random() > 0.5;
            const name = document.createElement('div');
            name.className = 'float-name';
            name.innerText = isTeisi ? 'Teisi' : 'Jocelyn';
            name.style.color = isTeisi ? '#9c27b0' : '#ff2d75'; 
            name.style.left = (Math.random() * 80 + 10) + "vw";
            name.style.fontSize = (Math.random() * 1 + 1.5) + "rem";
            document.body.appendChild(name);
            setTimeout(() => name.remove(), 5000);
        }, 400);
    }

    function irASeleccion() {
        document.getElementById('panel-poema').style.display = 'none';
        document.getElementById('panel-seleccion').style.display = 'block';
    }

    function final(opcion) {
        document.getElementById('panel-seleccion').style.display = 'none';
        document.getElementById('panel-propuesta').style.display = 'none';
        const pFinal = document.getElementById('panel-final');
        const titulo = document.getElementById('final-titulo');
        const texto = document.getElementById('final-texto');
        pFinal.style.display = 'block';

        if(opcion === 'si') {
            titulo.innerText = "Más allá del Sol";
            texto.innerText = "Elegiste el 'Sí' porque nuestro amor tiene la fuerza de un cohete y la calma de las estrellas.";
        } else if(opcion === 'no') {
            titulo.innerText = "Siempre aquí";
            texto.innerText = "Incluso en la duda, este espacio siempre estará abierto para ti. Te esperaré en mi infinito.";
        } else {
            titulo.innerText = "¡Atrapado!";
            texto.innerText = "Hiciste clic en NO, pero el universo conspiró para que supieras que te amo de todos modos.";
        }
    }
</script>
</body>
</html>
