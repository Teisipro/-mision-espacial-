<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>To Infinity and Beyond</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');

        :root {
            --apple-green: #32d74b;
            --apple-red: #ff453a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        #starField {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0a0a1a 0%, #000 100%);
        }

        /* Canvas para animaciones especiales */
        #animationCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            display: none; /* Se activa al desbloquear */
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 40px;
            width: 85%;
            max-width: 450px;
            text-align: center;
            z-index: 10;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (max-width: 480px) {
            .glass-panel { padding: 30px 20px; }
        }

        .lives { font-size: 24px; margin-bottom: 20px; letter-spacing: 5px; }
        h2 { font-weight: 300; margin-bottom: 30px; }
        .riddle-container { margin-bottom: 15px; text-align: left; }
        
        input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 18px;
            color: white;
            outline: none;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            background: #fff;
            color: #000;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            max-width: 250px;
        }

        #final-screen {
            display: none;
            width: 90%;
            max-width: 1000px;
            padding: 60px 0;
            text-align: center;
            opacity: 0;
            z-index: 5;
        }

        .title-main {
            font-size: clamp(1.8rem, 10vw, 3.5rem);
            font-weight: 700;
            background: linear-gradient(180deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .memory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .memory-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 25px;
            animation: fadeInUp 0.8s ease forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="starField"></div>
<canvas id="animationCanvas"></canvas>
<div id="youtube-player"></div>

<div class="glass-panel" id="accessPanel">
    <div class="lives" id="heartBox">❤️❤️❤️❤️❤️</div>
    <h2>Space Mission</h2>
    <div class="riddle-container"><input type="text" id="q1" placeholder="...hijos" autocomplete="off"></div>
    <div class="riddle-container"><input type="text" id="q2" placeholder="...voces de amor" autocomplete="off"></div>
    <div class="riddle-container"><input type="text" id="q3" placeholder="Gritan a sol tu voz..." autocomplete="off"></div>
    <button onclick="checkAnswers()">Verify Identity</button>
</div>

<div id="final-screen">
    <h1 class="title-main">To Infinity and Beyond</h1>
    <p style="color: var(--apple-green); letter-spacing: 2px;">RECUERDOS DESBLOQUEADOS</p>
    <div class="memory-grid">
        <div class="memory-card" style="animation-delay: 0.2s;">
            <h3>El Primer Momento</h3>
            <p>Aquí puedes escribir sobre ese instante especial.</p>
        </div>
        <div class="memory-card" style="animation-delay: 0.4s;">
            <h3>Nuestra Aventura</h3>
            <p>Un viaje, una risa o ese día en la UNED.</p>
        </div>
        <div class="memory-card" style="animation-delay: 0.6s;">
            <h3>La Promesa</h3>
            <p>"Al infinito y más allá".</p>
        </div>
    </div>
</div>

<script>
    let lives = 5;
    let player;
    const canvas = document.getElementById('animationCanvas');
    const ctx = canvas.getContext('2d');

    // YouTube API
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtube-player', {
            height: '0', width: '0', videoId: 'WrjF8bZTCZI',
            playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': 'WrjF8bZTCZI' }
        });
    }

    function checkAnswers() {
        if (player && typeof player.playVideo === 'function') player.playVideo();
        const a1 = document.getElementById('q1').value.toLowerCase().trim();
        const a2 = document.getElementById('q2').value.toLowerCase().trim();
        const a3 = document.getElementById('q3').value.toLowerCase().trim();

        if (a1 === "saturno" && (a2 === "pluton" || a2 === "plutón") && (a3 === "la luna" || a3 === "luna")) {
            unlockPage();
        } else {
            lives--;
            document.getElementById('heartBox').innerHTML = "❤️".repeat(lives) + "🖤".repeat(5 - lives);
            if (lives <= 0) { alert("Acceso denegado."); location.reload(); }
        }
    }

    function unlockPage() {
        document.getElementById('accessPanel').style.opacity = "0";
        setTimeout(() => {
            document.getElementById('accessPanel').classList.add('hidden');
            const screen = document.getElementById('final-screen');
            screen.style.display = "block";
            canvas.style.display = "block";
            resizeCanvas();
            startAnimations();
            setTimeout(() => screen.style.opacity = "1", 50);
        }, 800);
    }

    // --- ANIMACIONES ESPACIALES ---
    let rocket = { x: -100, y: 0, speed: 2, angle: -0.5 };
    let shootingStars = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        rocket.y = canvas.height * 0.7;
    }

    function createShootingStar() {
        shootingStars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height / 2,
            len: Math.random() * 80 + 20,
            speed: Math.random() * 10 + 5,
            opacity: 1
        });
    }

    function drawRocket() {
        ctx.save();
        ctx.translate(rocket.x, rocket.y);
        ctx.rotate(rocket.angle);
        // Cuerpo Cohete
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(0, 0, 20, 10, 0, 0, Math.PI * 2);
        ctx.fill();
        // Punta
        ctx.fillStyle = '#ff453a';
        ctx.beginPath();
        ctx.moveTo(20, 0); ctx.lineTo(10, -8); ctx.lineTo(10, 8);
        ctx.fill();
        // Fuego posterior
        ctx.fillStyle = '#ff9500';
        ctx.beginPath();
        ctx.moveTo(-20, 0); ctx.lineTo(-35, Math.random() * 10 - 5); ctx.lineTo(-20, 5);
        ctx.fill();
        ctx.restore();
        
        rocket.x += rocket.speed;
        rocket.y -= 0.5; // Sube un poco
        if (rocket.x > canvas.width + 100) rocket.x = -100;
    }

    function drawShootingStars() {
        shootingStars.forEach((s, i) => {
            ctx.strokeStyle = `rgba(255, 255, 255, ${s.opacity})`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(s.x, s.y);
            ctx.lineTo(s.x - s.len, s.y + s.len * 0.5);
            ctx.stroke();
            s.x += s.speed;
            s.y += s.speed * 0.5;
            s.opacity -= 0.01;
            if (s.opacity <= 0) shootingStars.splice(i, 1);
        });
        if (Math.random() < 0.02) createShootingStar();
    }

    function startAnimations() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawShootingStars();
        drawRocket();
        requestAnimationFrame(startAnimations);
    }

    window.addEventListener('resize', resizeCanvas);

    // Estrellas fijas de fondo
    const starField = document.getElementById('starField');
    for (let i = 0; i < 100; i++) {
        const star = document.createElement('div');
        star.style.cssText = `position:absolute; width:2px; height:2px; background:#fff; left:${Math.random()*100}%; top:${Math.random()*100}%; opacity:${Math.random()}; border-radius:50%;`;
        starField.appendChild(star);
    }
</script>
</body>
</html>
